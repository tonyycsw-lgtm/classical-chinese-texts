name: Sync from Google Drive

on:
  schedule:
    - cron: '0 */3 * * *'      # 每3小時執行一次
  workflow_dispatch:            # 允許手動執行
  push:
    branches: [ main ]

# ===== 權限宣告（必須） =====
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # 步驟 1：檢出程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 步驟 2：建立資料目錄
      - name: Create data directory
        run: mkdir -p docs/data

      # 步驟 3：安裝 gdown
      - name: Install gdown
        run: pip install gdown

      # 步驟 4：從 Google Drive 下載
      - name: Download from Google Drive
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          echo "📂 開始從 Google Drive 下載..."
          gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID" -O docs/data/ --remaining-ok
          echo "✅ 下載完成"
          echo "📁 已下載 $(ls docs/data/*.json 2>/dev/null | wc -l) 個 JSON 檔案"

      # 步驟 5：驗證 JSON 格式
      - name: Validate JSON files
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          
          echo "🔍 開始驗證 JSON 格式..."
          for file in docs/data/*.json; do
            if [ "$(basename "$file")" != "units-index.json" ] && [ -f "$file" ]; then
              if ! jq empty "$file" 2>/dev/null; then
                echo "❌ 無效的 JSON: $file"
                exit 1
              fi
              echo "✅ 驗證通過: $(basename "$file")"
            fi
          done
          echo "🎉 所有 JSON 檔案驗證通過"

      # 步驟 6：產生索引檔
      - name: Create index file
        run: |
          cd docs/data
          echo "[" > units-index.json
          first=true
          
          for file in *.json; do
            if [ "$file" != "units-index.json" ] && [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> units-index.json
              fi
              
              # 從檔案中讀取 unitName
              unitName=$(grep -o '"unitName"[[:space:]]*:[[:space:]]*"[^"]*"' "$file" | head -1 | sed 's/"unitName"[[:space:]]*:[[:space:]]*"//g' | sed 's/"//g')
              
              # 如果沒有 unitName，使用檔案名稱
              if [ -z "$unitName" ]; then
                unitName=$(basename "$file" .json)
              fi
              
              echo "  {\"unitId\": \"$(basename "$file" .json)\", \"unitName\": \"$unitName\", \"fileName\": \"$file\"}" >> units-index.json
              echo "📄 已加入索引: $unitName"
            fi
          done
          
          echo "]" >> units-index.json
          echo "✅ 索引檔已產生，共 $(grep -c 'unitId' units-index.json) 個項目"

      # 步驟 7：提交並推送變更（完整版）
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/
          
          # 檢查是否有變更
          if git diff --staged --quiet; then
            echo "📭 沒有變更，跳過提交"
          else
            git commit -m "自動同步 Google Drive 課文 - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已提交並推送更新"
          fi