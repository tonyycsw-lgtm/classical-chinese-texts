name: Sync from Google Drive

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create data directory
        run: mkdir -p docs/data

      - name: Download files from Google Drive
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          pip install gdown
          # 下載整個資料夾到暫存位置
          gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID" -O /tmp/gdrive_download/ --remaining-ok
          
          # 將所有檔案移動到正確位置（不管原本在幾層子資料夾）
          find /tmp/gdrive_download -type f \( -name "*.json" -o -name "*.txt" \) -exec cp {} docs/data/ \;
          
          echo "已複製的檔案："
          ls -la docs/data/

      - name: Create index file
        run: |
          cd docs/data
          echo "[" > units-index.json
          first=true
          # 處理所有 .json 和 .txt 檔案
          for file in *.json *.txt; do
            if [ "$file" != "units-index.json" ] && [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> units-index.json
              fi
              # 去除副檔名作為單元 ID
              filename=$(basename "$file" | sed 's/\.[^.]*$//')
              echo "  {\"unitId\": \"$filename\", \"unitName\": \"$filename\", \"fileName\": \"$file\"}" >> units-index.json
            fi
          done
          echo "]" >> units-index.json
          echo "產生的索引檔："
          cat units-index.json

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "沒有檔案變更"
          else
            git commit -m "自動同步 Google Drive 課文"
            git push
          fi
