name: Sync from Google Drive

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write  # 授予寫入權限

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  # 使用內建的 token

      - name: Create data directory
        run: mkdir -p docs/data

      - name: Download files from Google Drive
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          pip install gdown
          gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID" -O docs/data/ --remaining-ok --no-copy-folder-structure

      - name: Create index file
        run: |
          cd docs/data
          echo "[" > units-index.json
          first=true
          for file in *.json *.txt; do
            if [ "$file" != "units-index.json" ] && [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> units-index.json
              fi
              filename=$(basename "$file" .${file##*.})
              echo "  {\"unitId\": \"$filename\", \"unitName\": \"$filename\", \"fileName\": \"$file\"}" >> units-index.json
            fi
          done
          echo "]" >> units-index.json

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/
          if git diff --staged --quiet; then
            echo "沒有檔案變更"
          else
            git commit -m "自動同步 Google Drive 課文"
            git push
          fi
