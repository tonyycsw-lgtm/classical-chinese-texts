name: Sync from Google Drive

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create data directory
        run: mkdir -p docs/data

      - name: Clean data directory
        run: |
          echo "🧹 清空 docs/data/ 目錄..."
          rm -rf docs/data/*
          mkdir -p docs/data
          echo "✅ 目錄已清空，準備重新下載"

      - name: Install gdown
        run: pip install gdown

      - name: Download from Google Drive
        env:
          FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          echo "📂 開始從 Google Drive 下載..."
          # 先下載到暫存目錄
          gdown --folder "https://drive.google.com/drive/folders/$FOLDER_ID" -O /tmp/gdrive/ --remaining-ok
          
          # 將所有 JSON 檔案複製到正確位置
          echo "📁 移動 JSON 檔案到 docs/data/ ..."
          find /tmp/gdrive -type f -name "*.json" -exec cp {} docs/data/ \;
          
          # 顯示已複製的檔案
          JSON_COUNT=$(ls docs/data/*.json 2>/dev/null | wc -l)
          echo "📁 已複製 $JSON_COUNT 個 JSON 檔案"

      - name: Validate JSON files
        run: |
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi
          
          echo "🔍 開始驗證 JSON 格式..."
          for file in docs/data/*.json; do
            if [ "$(basename "$file")" != "units-index.json" ] && [ -f "$file" ]; then
              if ! jq empty "$file" 2>/dev/null; then
                echo "❌ 無效的 JSON: $file"
                exit 1
              fi
              echo "✅ 驗證通過: $(basename "$file")"
            fi
          done
          echo "🎉 所有 JSON 檔案驗證通過"

      - name: Create index file
        run: |
          cd docs/data
          
          echo "[" > units-index.json
          first=true
          
          for file in *.json; do
            if [ "$file" != "units-index.json" ] && [ -f "$file" ]; then
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> units-index.json
              fi
              
              # 使用 jq 讀取 unitName（正確處理中文）
              if command -v jq &> /dev/null; then
                unitName=$(jq -r '.unitName // ""' "$file" 2>/dev/null)
              fi
              
              if [ -z "$unitName" ]; then
                unitName=$(basename "$file" .json)
              fi
              
              unitId=$(basename "$file" .json)
              
              printf '  {\"unitId\": \"%s\", \"unitName\": \"%s\", \"fileName\": \"%s\"}\n' "$unitId" "$unitName" "$file" >> units-index.json
              echo "📄 已加入索引: $unitName"
            fi
          done
          
          echo "]" >> units-index.json
          echo "✅ 索引檔已產生，共 $(grep -c 'unitId' units-index.json) 個項目"

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/data/
          
          if git diff --staged --quiet; then
            echo "📭 沒有變更，跳過提交"
          else
            git commit -m "自動同步 Google Drive 課文 - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ 已提交並推送更新"
          fi