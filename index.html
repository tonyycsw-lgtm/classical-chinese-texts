<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>DSE指定篇章</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ===== 原有樣式保持不變 ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Helvetica Neue", "Arial", "Microsoft YaHei", sans-serif;
    }
    body {
      padding: 20px 20px 20px 0;
      background: linear-gradient(135deg, #f8fafc 0%, #eef2f7 100%);
      line-height: 1.6;
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      justify-content: flex-end;
    }
    [lang="zh"] {
      letter-spacing: 0.2em;
      line-height: 1.9;
      font-weight: 400;
      word-spacing: 0.1em;
    }
    .article-title[lang="zh"] {
      font-size: 24px;
      font-weight: 700;
      color: #1a365d;
      margin-bottom: 10px;
      text-align: center;
      white-space: pre-line;
      line-height: 2.0;
      letter-spacing: 0.25em;
    }
    .sentence-slice {
      line-height: 2.0;
      letter-spacing: 0.2em;
      font-weight: 400;
      transition: background-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border-radius: 4px;
      padding: 2px 0;
      white-space: nowrap;
    }
    .sentence-slice:hover,
    .sentence-slice.sentence-selected,
    .sentence-slice.playing {
      background-color: rgba(79, 70, 229, 0.12);
      box-shadow: 0 1px 4px rgba(79, 70, 229, 0.1);
    }
    .translation-sentence {
      transition: background-color 0.2s, box-shadow 0.2s;
      border-radius: 4px;
      padding: 2px 0;
      cursor: default;
    }
    .translation-sentence:hover,
    .translation-sentence.translation-highlight {
      background-color: rgba(79, 70, 229, 0.12);
      box-shadow: 0 1px 4px rgba(79, 70, 229, 0.1);
    }
    .btn[lang="zh"] {
      letter-spacing: 0.18em;
      line-height: 1.6;
    }
    .section-title[lang="zh"] {
      line-height: 2.0;
      letter-spacing: 0.2em;
    }
    .unit-control-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #e9ecef;
    }
    .unit-selector-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .unit-select {
      padding: 8px 16px;
      border: 1.5px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      color: #2d3748;
      background-color: white;
      cursor: pointer;
      min-width: 280px;
    }
    .upload-btn {
      background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
      color: white;
      border: none;
      padding: 8px 16px;
      font-size: 13px;
    }
    .main-content {
      width: calc(100% - 420px);
      max-width: 210mm;
      margin-right: 400px;
      margin-left: 20px;
    }
    .a4-container {
      width: 100%;
      min-height: 297mm;
      padding: 20mm;
      background-color: white;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
      border-radius: 8px;
      border: 1px solid #e9ecef;
      overflow: visible;
    }
    .article-section {
      width: 100%;
    }
    .article-paragraph-wrapper {
      border: 1px solid #e2e8f0;
      padding: 16px;
      border-radius: 8px;
      font-size: 13px;
      color: #2d3748;
      text-align: justify;
      background-color: #fcfdfe;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .single-paragraph {
      margin-bottom: 12px;
    }
    .fixed-tooltip {
      position: fixed;
      top: 100px;
      right: 30px;
      width: 360px;
      background: #ffffff;
      border: 1px solid #e9ecef;
      box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.15);
      border-radius: 20px;
      font-size: 13px;
      line-height: 1.7;
      color: #0f172a;
      z-index: 1000;
      transition: opacity 0.2s, box-shadow 0.2s;
      opacity: 0;
      pointer-events: none;
      max-height: calc(100vh - 140px);
      overflow-y: auto;
    }
    .fixed-tooltip.show {
      opacity: 1;
      pointer-events: auto;
    }
    .fixed-tooltip.dragging {
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.3);
      transition: none;
      cursor: grabbing;
    }
    .tooltip-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e9ecef;
      cursor: grab;
      user-select: none;
    }
    .tooltip-header:active {
      cursor: grabbing;
    }
    .drag-handle {
      color: #94a3b8;
      font-size: 14px;
      letter-spacing: 2px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
    }
    .drag-handle:hover {
      background: #f1f5f9;
      color: #4f46e5;
    }
    .drag-handle i {
      font-size: 12px;
      margin-right: 4px;
    }
    .tooltip-content {
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }
    @media screen and (max-width: 768px) {
      .fixed-tooltip {
        display: none;
      }
    }
    .fixed-tooltip .phrase {
      color: #1e40af;
      font-weight: 600;
      margin-bottom: 12px;
      background-color: #f0f9ff;
      padding: 8px 12px 8px 24px; 
      border-radius: 8px;
      border-left: 4px solid #3b82f6;
    }
    .fixed-tooltip .vocab-list {
      margin-top: 8px;
      border-top: 1px dashed #d1d5db;
      padding-top: 8px;
    }
    .fixed-tooltip .vocab-item {
      margin-bottom: 4px;
    }
    .footnotes-section {
      margin: 16px 0 24px;
      padding: 12px 16px;
      background-color: #f8fafc;
      border-radius: 8px;
      border-left: 4px solid #4f46e5;
      font-size: 12px;
    }
    .footnotes-section h5 {
      font-size: 13px;
      font-weight: 700;
      color: #1e40af;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .footnotes-section ol {
      padding-left: 20px;
      margin: 0;
      list-style-type: decimal;
    }
    .footnotes-section li {
      margin-bottom: 6px;
      color: #2d3748;
      line-height: 1.6;
    }
    .footnotes-section li strong {
      color: #4f46e5;
      font-weight: 600;
      margin-right: 4px;
    }
    .footnotes-section li .context {
      display: inline;
      font-size: 11px;
      color: #6b7280;
      margin-left: 6px;
      font-style: italic;
      border-left: none;
      padding-left: 0;
    }
    .paragraph-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin: 12px 0 8px;
    }
    .btn {
      border: none;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.25s;
      font-weight: 500;
    }
    .btn-outline {
      background: transparent;
      color: #4f46e5;
      border: 1.5px solid #c7d2fe;
    }
    .btn-outline:hover {
      background: #f1f5f9;
      border-color: #4f46e5;
    }
    .btn-outline.playing {
      background: #ef4444;
      color: white;
      border-color: #ef4444;
    }
    .btn-outline.active {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }
    .toggle-button-group {
      display: inline-flex;
      border-radius: 6px;
      overflow: hidden;
      border: 1.5px solid #c7d2fe;
      background: white;
    }
    .toggle-button-group .btn {
      margin: 0 !important;
      border-radius: 0;
      border: none;
      border-right: 1.5px solid #c7d2fe;
      background: transparent;
      color: #4f46e5;
      padding: 6px 12px;
      font-size: 11px;
    }
    .toggle-button-group .btn:last-child {
      border-right: none;
    }
    .toggle-button-group .btn.active {
      background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%);
      color: white;
      border-color: #4f46e5;
    }
    .unified-content {
      margin-top: 12px;
      border-radius: 8px;
      overflow: hidden;
    }
    .unified-content .translation-content {
      margin: 0;
      padding: 16px;
      background-color: #f0f9ff;
      border-left: 4px solid #3b82f6;
      color: #1e40af;
      font-size: 12px;
      line-height: 1.8;
      letter-spacing: 0.18em;
      border-radius: 0 6px 6px 0;
      display: block;
    }
    .unified-content .implication-content {
      margin: 0;
      padding: 16px;
      background-color: #fefce8;
      border-left: 4px solid #f59e0b;
      color: #92400e;
      font-size: 12px;
      display: none;
      border-radius: 0 6px 6px 0;
      flex-direction: column;
      gap: 12px;
    }
    .unified-content .implication-content .section-content {
      padding-left: 0;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 12px 0 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0 10px 16px;
      border-left: 4px solid;
      background: linear-gradient(to right, rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.8));
      border-radius: 0 6px 6px 0;
    }
    .appreciation-title { border-color: #8b5cf6; color: #6d28d9; }
    .key-points-title { border-color: #059669; color: #065f46; }
    .short-answer-title { border-color: #d97706; color: #b45309; }
    .title-icon {
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: white;
    }
    .interactive-section {
      margin-top: 20px;
      margin-bottom: 30px;
      padding: 18px;
      background: white;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      position: relative;
    }
    .appreciation-content, .key-points-content, .short-answer-content {
      font-size: 13px;
      line-height: 1.9;
      color: #2d3748;
    }
    .appreciation-section {
      margin-bottom: 20px;
    }
    .appreciation-section h4 {
      font-size: 14px;
      font-weight: 700;
      color: #6d28d9;
      margin-bottom: 8px;
    }
    .appreciation-section p {
      margin-bottom: 12px;
      padding-left: 12px;
      border-left: 3px solid #e2e8f0;
    }
    .key-points-content .point-item, .short-answer-content .qa-item {
      margin-bottom: 16px;
      padding-left: 12px;
      border-left: 3px solid #e2e8f0;
    }
    .key-points-content .point-item strong, .short-answer-content .qa-item strong {
      color: #4f46e5;
      font-weight: 600;
      display: inline-block;
      min-width: 80px;
    }
    .qa-item .question {
      font-weight: 600;
      color: #b45309;
    }
    .qa-item .answer {
      margin-top: 4px;
      color: #2d3748;
    }
    .spacer {
      height: 50px;
    }
    .grammar-techniques {
      margin-top: 8px;
    }
    .technique-item {
      margin-bottom: 10px;
      border-bottom: 1px dashed #e2e8f0;
      padding-bottom: 8px;
    }
    .technique-item:last-child {
      border-bottom: none;
    }
    .technique-type {
      font-weight: 700;
      color: #b45309;
      display: inline-block;
      background: #fef3c7;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-bottom: 4px;
    }
    .technique-example {
      font-style: italic;
      color: #6b7280;
      background: #f9fafb;
      padding: 4px 8px;
      border-radius: 4px;
      margin: 4px 0;
      font-size: 11px;
    }
    .technique-effect {
      font-size: 11px;
      color: #374151;
    }

    @media screen and (min-width: 1201px) {
      .fixed-tooltip {
        display: block;
        right: 30px;
        width: 360px;
      }
    }
    @media screen and (min-width: 769px) and (max-width: 1200px) {
      .fixed-tooltip {
        display: block;
        right: 15px;
        width: 300px;
        font-size: 12px;
        top: 80px;
      }
      .main-content {
        width: calc(100% - 340px);
        margin-right: 330px;
      }
    }
    @media screen and (max-width: 768px) {
      body {
        justify-content: center;
      }
      .main-content {
        width: 100%;
        margin-right: 0;
        margin-left: 0;
      }
      .fixed-tooltip {
        display: none;
      }
    }
  </style>
  <script src="js/unit-core.js"></script>
  <script src="js/ui-enhancements.js"></script>
</head>
<body>
<div class="main-content">
  <div class="unit-control-bar">
    <div class="unit-selector-wrapper">
      <label for="unit-select"><i class="fas fa-book-open"></i> 選擇篇章：</label>
      <select id="unit-select" class="unit-select">
        <option value="">載入索引中…</option>
      </select>
    </div>
    <div class="upload-wrapper">
      <label for="unit-upload" class="btn btn-outline upload-btn"><i class="fas fa-upload"></i> 上傳單元</label>
      <input type="file" id="unit-upload" accept="application/json" style="display:none;" multiple>
    </div>
  </div>

  <div class="a4-container" id="a4-container">
    <div class="article-section" id="article-section"></div>

    <h2 class="section-title appreciation-title" lang="zh"><span class="title-icon"><i class="fas fa-feather-alt"></i></span> 文章賞析</h2>
    <div class="interactive-section" id="appreciation-section">
      <div class="appreciation-content" id="appreciation-content"></div>
    </div>

    <h2 class="section-title key-points-title" lang="zh"><span class="title-icon"><i class="fas fa-star"></i></span> 課文重點</h2>
    <div class="interactive-section" id="key-points-section">
      <div class="key-points-content" id="key-points-content"></div>
    </div>

    <h2 class="section-title short-answer-title" lang="zh"><span class="title-icon"><i class="fas fa-question-circle"></i></span> 簡答題</h2>
    <div class="interactive-section" id="short-answer-section">
      <div class="short-answer-content" id="short-answer-content"></div>
    </div>
    <div class="spacer"></div>
  </div>
</div>

<div id="fixed-tooltip" class="fixed-tooltip">
  <div class="tooltip-header" id="tooltip-drag-handle">
    <div class="drag-handle">
      <i class="fas fa-grip-vertical"></i> ⋮⋮
    </div>
  </div>
  <div class="tooltip-content" id="tooltip-content">
    <!-- 動態內容會放在這裡 -->
  </div>
</div>

<script>
  // ==================== 全域變數 ====================
  let currentUnitData = null;
  let unitsIndex = [];
  let sliceContents = {};
  window.sliceContents = sliceContents;

  // ==================== TTS 控制器 ====================
  const TTSController = {
    isSupported() {
      return 'speechSynthesis' in window;
    },
    getCantoneseVoice() {
      if (!this.isSupported()) return null;
      const voices = window.speechSynthesis.getVoices();
      let voice = voices.find(v => v.lang.includes('zh-HK') || v.lang.includes('yue') || (v.lang.includes('zh') && v.lang.includes('HK')));
      if (!voice) voice = voices.find(v => v.lang.includes('zh-CN') || v.lang.includes('zh-TW') || v.lang.includes('zh'));
      return voice;
    },
    speak(text, callback) {
      if (!this.isSupported()) {
        if (callback) callback();
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-HK';
      utterance.rate = 0.7;
      utterance.pitch = 1.0;
      utterance.volume = 1.0;
      const voice = this.getCantoneseVoice();
      if (voice) utterance.voice = voice;
      utterance.onend = () => { if (callback) callback(); };
      utterance.onerror = () => { if (callback) callback(); };
      window.speechSynthesis.speak(utterance);
    },
    stop() {
      if (this.isSupported()) window.speechSynthesis.cancel();
    }
  };

  // ==================== 音頻控制器 ====================
  const AudioController = {
    currentAudio: null,
    currentButton: null,
    currentPlayingSlice: null,
    currentPlayingTranslation: null,
    currentPlaylist: [],
    currentPlaylistIndex: -1,
    isPlayingParagraph: false,
    ttsPlaying: false,

    resetButton(btn) {
      if (!btn) return;
      btn.classList.remove('playing', 'loading');
      if (btn.classList.contains('paragraph-audio-btn')) btn.innerHTML = '<i class="fas fa-volume-up"></i> 朗讀';
      else if (btn.classList.contains('vocab-audio-btn')) btn.innerHTML = '<i class="fas fa-volume-up"></i>';
      else btn.innerHTML = btn.innerHTML.includes('朗讀') ? '<i class="fas fa-volume-up"></i> 朗讀' : '<i class="fas fa-play"></i>';
    },
    stop() {
      if (window.speechSynthesis) window.speechSynthesis.cancel();
      if (this.currentAudio) { this.currentAudio.pause(); this.currentAudio.currentTime = 0; this.currentAudio = null; }
      if (this.currentButton) { this.resetButton(this.currentButton); this.currentButton = null; }
      document.querySelectorAll('.sentence-slice.playing').forEach(el => el.classList.remove('playing'));
      document.querySelectorAll('.translation-sentence.translation-highlight').forEach(el => el.classList.remove('translation-highlight'));
      this.currentPlayingSlice = null;
      this.currentPlayingTranslation = null;
      this.currentPlaylist = [];
      this.currentPlaylistIndex = -1;
      this.isPlayingParagraph = false;
      this.ttsPlaying = false;
    },
    playSlice(sliceEl, audioUrl) {
      if (this.currentPlayingSlice === sliceEl && (this.currentAudio || this.ttsPlaying)) { this.stop(); return; }
      this.stop();
      const sliceText = sliceEl.textContent;
      sliceEl.classList.add('playing');
      this.currentPlayingSlice = sliceEl;
      const paraNum = sliceEl.dataset.para;
      const sliceId = sliceEl.dataset.sliceId;
      const unitId = document.querySelector('.article-paragraph-wrapper')?.id.replace('article-content-', '') || 'custom';
      const transContainer = document.getElementById(unitId + '_trans-' + paraNum);
      if (transContainer) {
        const targetTrans = transContainer.querySelector('.translation-sentence[data-slice-id="' + sliceId + '"]');
        if (targetTrans) { targetTrans.classList.add('translation-highlight'); this.currentPlayingTranslation = targetTrans; }
      }
      const playNext = () => {
        sliceEl.classList.remove('playing');
        if (this.currentPlayingTranslation) { this.currentPlayingTranslation.classList.remove('translation-highlight'); this.currentPlayingTranslation = null; }
        this.currentPlayingSlice = null;
        this.currentAudio = null;
        if (this.currentButton) { this.resetButton(this.currentButton); this.currentButton = null; }
      };
      if (audioUrl) {
        const audio = new Audio(audioUrl);
        audio.onended = playNext;
        audio.onerror = () => { this.ttsPlaying = true; TTSController.speak(sliceText, () => { this.ttsPlaying = false; playNext(); }); };
        audio.play().catch(() => { this.ttsPlaying = true; TTSController.speak(sliceText, () => { this.ttsPlaying = false; playNext(); }); });
        this.currentAudio = audio;
      } else {
        this.ttsPlaying = true;
        TTSController.speak(sliceText, () => { this.ttsPlaying = false; playNext(); });
      }
    },
    playParagraph(paraNum, unitId, button) {
      if (this.currentButton === button && (this.currentAudio || this.ttsPlaying)) { this.stop(); return; }
      this.stop();
      const paraElement = document.getElementById(unitId + '_para' + paraNum + '-text');
      if (!paraElement) return;
      const sliceElements = paraElement.querySelectorAll('.sentence-slice');
      if (sliceElements.length === 0) return;
      const slices = currentUnitData.article.paragraphs[paraNum - 1].slices;
      this.currentPlaylist = [];
      sliceElements.forEach((sliceEl, index) => {
        const sliceData = slices[index];
        this.currentPlaylist.push({ audio: sliceData?.audio || null, text: sliceEl.textContent, sliceEl: sliceEl, paraNum: paraNum, sliceId: parseInt(sliceEl.dataset.sliceId) });
      });
      if (this.currentPlaylist.length === 0) return;
      this.currentButton = button;
      button.innerHTML = '<i class="fas fa-stop"></i> 停止';
      button.classList.add('playing');
      this.currentPlaylistIndex = 0;
      this.isPlayingParagraph = true;
      this._playNextInPlaylist();
    },
    _playNextInPlaylist() {
      if (!this.isPlayingParagraph || this.currentPlaylistIndex >= this.currentPlaylist.length) { this.stop(); return; }
      const item = this.currentPlaylist[this.currentPlaylistIndex];
      document.querySelectorAll('.sentence-slice.playing').forEach(el => el.classList.remove('playing'));
      document.querySelectorAll('.translation-sentence.translation-highlight').forEach(el => el.classList.remove('translation-highlight'));
      item.sliceEl.classList.add('playing');
      const unitId = document.querySelector('.article-paragraph-wrapper')?.id.replace('article-content-', '') || 'custom';
      const transContainer = document.getElementById(unitId + '_trans-' + item.paraNum);
      if (transContainer) {
        const targetTrans = transContainer.querySelector('.translation-sentence[data-slice-id="' + item.sliceId + '"]');
        if (targetTrans) { targetTrans.classList.add('translation-highlight'); this.currentPlayingTranslation = targetTrans; }
      }
      const playNext = () => {
        item.sliceEl.classList.remove('playing');
        if (this.currentPlayingTranslation) { this.currentPlayingTranslation.classList.remove('translation-highlight'); this.currentPlayingTranslation = null; }
        this.currentPlaylistIndex++;
        this._playNextInPlaylist();
      };
      if (item.audio) {
        const audio = new Audio(item.audio);
        audio.onended = playNext;
        audio.onerror = () => { this._playTTSForItem(item, playNext); };
        audio.play().catch(() => { this._playTTSForItem(item, playNext); });
        this.currentAudio = audio;
      } else {
        this._playTTSForItem(item, playNext);
      }
    },
    _playTTSForItem(item, callback) {
      if (this.ttsPlaying) return;
      this.ttsPlaying = true;
      TTSController.speak(item.text, () => { this.ttsPlaying = false; callback(); });
    },
    playVocabularyWord(vocabId, unitId, wordText) {
      const btn = document.getElementById(`${unitId}_vocab-audio-btn-${vocabId}`);
      if (this.currentButton === btn && (this.currentAudio || this.ttsPlaying)) { this.stop(); return; }
      this.stop();
      if (!btn) return;
      btn.classList.add('playing');
      btn.innerHTML = '<i class="fas fa-stop"></i>';
      this.currentButton = btn;
      const playNext = () => { btn.classList.remove('playing'); btn.innerHTML = '<i class="fas fa-volume-up"></i>'; this.currentButton = null; this.currentAudio = null; };
      const audioUrl = `./audio/words/${vocabId}.mp3`;
      const audio = new Audio(audioUrl);
      audio.onended = playNext;
      audio.onerror = () => { this.ttsPlaying = true; TTSController.speak(wordText, () => { this.ttsPlaying = false; playNext(); }); };
      audio.play().catch(() => { this.ttsPlaying = true; TTSController.speak(wordText, () => { this.ttsPlaying = false; playNext(); }); });
      this.currentAudio = audio;
    }
  };

  // ==================== FixedTooltip（可拖曳 + 延遲隱藏）====================
  const FixedTooltip = {
    tooltipEl: document.getElementById('fixed-tooltip'),
    currentSliceKey: null,
    hideTimer: null,

    generateSliceContent(paraNum, sliceId) {
      const key = paraNum + '-' + sliceId;
      const sliceData = sliceContents[key];
      if (!sliceData) return '';
      const sliceText = sliceData.text;
      const translation = sliceData.translation;
      const vocabItems = (sliceData.vocabIds || []).map(id => {
        const v = currentUnitData?.vocabulary.find(v => v.id === id);
        return v ? '<div class="vocab-item"><strong>' + v.word + '</strong> ' + v.meaning + '</div>' : null;
      }).filter(Boolean);
      let html = '<div class="phrase">「' + sliceText + '」 ' + translation + '</div>';
      if (vocabItems.length) html += '<div class="vocab-list">' + vocabItems.join('') + '</div>';
      else html += '<div class="vocab-list">（無核心詞彙）</div>';
      return html;
    },

    show(paraNum, sliceId) {
      const key = paraNum + '-' + sliceId;
      if (this.hideTimer) { clearTimeout(this.hideTimer); this.hideTimer = null; }
      if (this.currentSliceKey === key && this.tooltipEl.classList.contains('show')) return;
      const content = this.generateSliceContent(paraNum, sliceId);
      if (!content) return;
      this.currentSliceKey = key;
      const contentArea = document.getElementById('tooltip-content');
      if (contentArea) contentArea.innerHTML = content;
      else this.tooltipEl.innerHTML = content;
      this.tooltipEl.classList.add('show');
    },

    hide() {
      if (this.hideTimer) clearTimeout(this.hideTimer);
      this.hideTimer = setTimeout(() => {
        this.tooltipEl.classList.remove('show');
        this.currentSliceKey = null;
        this.hideTimer = null;
      }, 300);
    },

    hideImmediately() {
      if (this.hideTimer) { clearTimeout(this.hideTimer); this.hideTimer = null; }
      this.tooltipEl.classList.remove('show');
      this.currentSliceKey = null;
    }
  };

  // ==================== 句子高亮 ====================
  const SliceHover = {
    highlightTranslation(unitId, paraNum, sliceId) {
      const transContainer = document.getElementById(unitId + '_trans-' + paraNum);
      if (transContainer) {
        const targetTrans = transContainer.querySelector('.translation-sentence[data-slice-id="' + sliceId + '"]');
        if (targetTrans) targetTrans.classList.add('translation-highlight');
      }
    },
    clearTranslationHighlight() {
      document.querySelectorAll('.translation-sentence.translation-highlight').forEach(el => el.classList.remove('translation-highlight'));
    },
    highlightSliceAndSelf(unitId, paraNum, sliceId, targetElement) {
      document.querySelectorAll('#' + unitId + '_para' + paraNum + '-text .sentence-slice[data-slice-id="' + sliceId + '"]').forEach(el => el.classList.add('sentence-selected'));
      if (targetElement) targetElement.classList.add('translation-highlight');
    },
    clearSliceAndSelfHighlight() {
      document.querySelectorAll('.sentence-slice.sentence-selected').forEach(el => el.classList.remove('sentence-selected'));
      document.querySelectorAll('.translation-sentence.translation-highlight').forEach(el => el.classList.remove('translation-highlight'));
    }
  };

  // ==================== 輔助函數 ====================
  function formatGrammar(grammar) {
    if (!grammar) return '';
    if (grammar.techniques && Array.isArray(grammar.techniques)) {
      let html = '<div class="grammar-techniques">';
      if (grammar.display) html += '<div>' + grammar.display.replace(/\n/g, '<br>') + '</div>';
      else grammar.techniques.forEach(tech => {
        html += '<div class="technique-item">';
        html += '<div class="technique-type">' + (tech.type || '') + '</div>';
        if (tech.example) html += '<div class="technique-example">「' + tech.example + '」</div>';
        if (tech.effect) html += '<div class="technique-effect">' + tech.effect + '</div>';
        html += '</div>';
      });
      html += '</div>';
      return html;
    }
    return grammar.replace(/\n/g, '<br>');
  }

  // ==================== 渲染器 ====================
  const Renderer = {
    renderAll(data, unitId = 'custom') {
      if (!data) return;
      currentUnitData = data;
      sliceContents = {};
      window.sliceContents = sliceContents;
      this.renderArticle(data, unitId);
      this.renderAppreciation(data);
      this.renderKeyPoints(data);
      this.renderShortAnswer(data);
      setTimeout(() => {
        this.attachHoverListeners(unitId);
        this.attachSliceClickListeners(unitId);
        this.attachSliceTooltips();
        window.sliceContents = sliceContents;
      }, 500);
    },

    renderArticle(data, unitId) {
      const container = document.getElementById('article-section');
      const art = data.article;
      let html = '<div class="article-header"><h3 class="article-title" lang="zh">' + art.title + '</h3></div><div class="article-paragraph-wrapper" id="article-content-' + unitId + '">';
      art.paragraphs.forEach((para, paraIndex) => {
        const paraNum = paraIndex + 1;
        const slices = para.slices || [];
        slices.forEach((slice, sliceIndex) => {
          const sliceId = sliceIndex + 1;
          const key = paraNum + '-' + sliceId;
          sliceContents[key] = { text: slice.text, translation: slice.translation, vocabIds: slice.vocabIds || [] };
          window.sliceContents = sliceContents;
        });
        html += '<div class="single-paragraph" id="' + unitId + '_para' + paraNum + '-text" data-para="' + paraNum + '">';
        slices.forEach((slice, sliceIndex) => {
          const sliceId = sliceIndex + 1;
          html += '<span class="sentence-slice" data-para="' + paraNum + '" data-slice-id="' + sliceId + '" data-audio="' + (slice.audio || '') + '">' + slice.text + '</span> ';
        });
        html += '</div>';
        html += '<div class="paragraph-controls">' +
          '<button class="btn btn-outline paragraph-audio-btn" onclick="AudioController.playParagraph(' + paraNum + ', \'' + unitId + '\', this)" id="' + unitId + '_para-audio-btn-' + paraNum + '"><i class="fas fa-volume-up"></i> 朗讀</button>' +
          '<div class="toggle-button-group">' +
          '<button class="btn toggle-btn" onclick="Renderer.showTranslation(' + paraNum + ',\'' + unitId + '\')" id="' + unitId + '_trans-btn-' + paraNum + '"><i class="fas fa-exchange-alt"></i> 語譯</button>' +
          '<button class="btn toggle-btn" onclick="Renderer.showImplication(' + paraNum + ',\'' + unitId + '\')" id="' + unitId + '_impl-btn-' + paraNum + '"><i class="fas fa-lightbulb"></i> 解讀</button>' +
          '</div>' +
          '<button class="btn btn-outline footnote-btn" onclick="Renderer.toggleFootnote(' + paraNum + ',\'' + unitId + '\')" id="' + unitId + '_footnote-btn-' + paraNum + '"><i class="fas fa-book-open"></i> 腳註</button>' +
          '</div>';
        html += '<div class="unified-content" id="' + unitId + '_content-' + paraNum + '">' +
          '<div class="translation-content" id="' + unitId + '_trans-' + paraNum + '" style="display: block;">';
        slices.forEach((slice, sliceIndex) => {
          const sliceId = sliceIndex + 1;
          html += '<span class="translation-sentence" data-slice-id="' + sliceId + '" data-para="' + paraNum + '">' + slice.translation + '</span> ';
        });
        html += '</div>' +
          '<div class="implication-content" id="' + unitId + '_impl-' + paraNum + '" style="display: none;">' +
          '<div class="section"><strong>本段主旨：</strong><div class="section-content">' + (para.implication?.summary || '') + '</div></div>' +
          '<div class="section"><strong>換句話說：</strong><div class="section-content">' + (para.implication?.paraphrase || '') + '</div></div>' +
          '<div class="section"><strong>語法分析：</strong><div class="section-content">' + formatGrammar(para.implication?.grammar) + '</div></div>' +
          '</div></div>';
        const vocabIdsSet = new Set();
        slices.forEach(slice => { (slice.vocabIds || []).forEach(id => vocabIdsSet.add(id)); });
        const paraVocabIds = Array.from(vocabIdsSet).sort((a, b) => a - b);
        if (paraVocabIds.length) {
          html += '<div class="footnotes-section" id="' + unitId + '_footnotes-' + paraNum + '" style="display:none;"><h5><i class="fas fa-book-open"></i> 本段註釋</h5><ol>';
          paraVocabIds.forEach(id => {
            const v = data.vocabulary.find(v => v.id === id);
            if (v) {
              const contextSlice = slices.find(s => (s.vocabIds || []).includes(id))?.text || '';
              html += '<li><strong>' + v.word + '</strong> ' + v.meaning + ' <span class="context">「' + contextSlice + '」</span></li>';
            }
          });
          html += '</ol></div>';
        }
      });
      html += '</div>';
      container.innerHTML = html;
    },

    renderAppreciation(data) {
      const div = document.getElementById('appreciation-content');
      if (!div) return;
      if (!data.appreciation?.content?.length) { div.innerHTML = '<p>暫無文章賞析</p>'; return; }
      let html = '';
      data.appreciation.content.forEach(section => {
        html += '<div class="appreciation-section"><h4>' + (section.section || '') + '</h4><p>' + (section.text || '').replace(/\n/g, '<br>') + '</p></div>';
      });
      div.innerHTML = html;
    },

    renderKeyPoints(data) {
      const div = document.getElementById('key-points-content');
      if (!div) return;
      if (!data.keyPoints?.points?.length) { div.innerHTML = '<p>暫無課文重點</p>'; return; }
      let html = '';
      data.keyPoints.points.forEach(point => {
        html += '<div class="point-item"><strong>' + (point.phrase || '') + '</strong> ' + (point.explanation || '') + '</div>';
      });
      div.innerHTML = html;
    },

    renderShortAnswer(data) {
      const div = document.getElementById('short-answer-content');
      if (!div) return;
      if (data.examQuestions?.questions?.length) {
        let html = '';
        data.examQuestions.questions.forEach(qa => {
          html += '<div class="qa-item"><div class="question">' + (qa.question || '') + '</div><div class="answer">' + (qa.answer || '').replace(/\n/g, '<br>') + '</div></div>';
        });
        div.innerHTML = html;
      } else div.innerHTML = '<p>此課文暫無簡答題</p>';
    },

    attachHoverListeners(unitId) {
      document.querySelectorAll('.sentence-slice').forEach(el => {
        if (el.hasAttribute('data-hover-listener')) return;
        el.setAttribute('data-hover-listener', 'true');
        el.addEventListener('mouseenter', (e) => {
          const paraNum = e.target.dataset.para;
          const sliceId = e.target.dataset.sliceId;
          if (paraNum && sliceId) SliceHover.highlightTranslation(unitId, paraNum, sliceId);
        });
        el.addEventListener('mouseleave', () => SliceHover.clearTranslationHighlight());
      });
      document.querySelectorAll('.translation-sentence').forEach(el => {
        if (el.hasAttribute('data-chinese-hover')) return;
        el.setAttribute('data-chinese-hover', 'true');
        el.addEventListener('mouseenter', (e) => {
          const paraNum = e.target.dataset.para;
          const sliceId = e.target.dataset.sliceId;
          if (paraNum && sliceId) SliceHover.highlightSliceAndSelf(unitId, paraNum, sliceId, e.target);
        });
        el.addEventListener('mouseleave', () => SliceHover.clearSliceAndSelfHighlight());
      });
    },

    attachSliceClickListeners(unitId) {
      document.querySelectorAll('.sentence-slice').forEach(slice => {
        if (slice.hasAttribute('data-click-listener')) return;
        slice.setAttribute('data-click-listener', 'true');
        slice.addEventListener('click', (e) => {
          e.stopPropagation();
          AudioController.playSlice(e.target, e.target.dataset.audio);
        });
      });
    },

    attachSliceTooltips() {
      // 句子懸停
      document.querySelectorAll('.sentence-slice').forEach(slice => {
        if (slice.hasAttribute('data-tooltip-bound')) return;
        slice.setAttribute('data-tooltip-bound', 'true');
        const paraNum = slice.dataset.para;
        const sliceId = slice.dataset.sliceId;
        slice.addEventListener('mouseenter', () => FixedTooltip.show(parseInt(paraNum), parseInt(sliceId)));
        slice.addEventListener('mouseleave', () => FixedTooltip.hide());
      });
      // 翻譯懸停
      document.querySelectorAll('.translation-sentence').forEach(trans => {
        if (trans.hasAttribute('data-trans-tooltip-bound')) return;
        trans.setAttribute('data-trans-tooltip-bound', 'true');
        const paraNum = trans.dataset.para;
        const sliceId = trans.dataset.sliceId;
        trans.addEventListener('mouseenter', () => FixedTooltip.show(parseInt(paraNum), parseInt(sliceId)));
        trans.addEventListener('mouseleave', () => FixedTooltip.hide());
      });
      // Tooltip 自身事件
      const tooltip = document.getElementById('fixed-tooltip');
      if (tooltip && !tooltip.hasAttribute('data-tooltip-self-bound')) {
        tooltip.setAttribute('data-tooltip-self-bound', 'true');
        tooltip.addEventListener('mouseenter', () => {
          if (FixedTooltip.hideTimer) { clearTimeout(FixedTooltip.hideTimer); FixedTooltip.hideTimer = null; }
        });
        tooltip.addEventListener('mouseleave', () => FixedTooltip.hideImmediately());
      }
    },

    showTranslation(paraNum, unitId) {
      const trans = document.getElementById(unitId + '_trans-' + paraNum);
      const impl = document.getElementById(unitId + '_impl-' + paraNum);
      const btnT = document.getElementById(unitId + '_trans-btn-' + paraNum);
      const btnI = document.getElementById(unitId + '_impl-btn-' + paraNum);
      if (trans.style.display === 'block') { trans.style.display = 'none'; btnT.classList.remove('active'); }
      else { trans.style.display = 'block'; impl.style.display = 'none'; btnT.classList.add('active'); btnI.classList.remove('active'); }
    },

    showImplication(paraNum, unitId) {
      const trans = document.getElementById(unitId + '_trans-' + paraNum);
      const impl = document.getElementById(unitId + '_impl-' + paraNum);
      const btnT = document.getElementById(unitId + '_trans-btn-' + paraNum);
      const btnI = document.getElementById(unitId + '_impl-btn-' + paraNum);
      if (impl.style.display === 'flex' || impl.style.display === 'block') { impl.style.display = 'none'; btnI.classList.remove('active'); }
      else { impl.style.display = 'flex'; trans.style.display = 'none'; btnI.classList.add('active'); btnT.classList.remove('active'); }
    },

    toggleFootnote(paraNum, unitId) {
      const foot = document.getElementById(unitId + '_footnotes-' + paraNum);
      const btn = document.getElementById(unitId + '_footnote-btn-' + paraNum);
      if (foot.style.display === 'none' || foot.style.display === '') { foot.style.display = 'block'; btn.classList.add('active'); }
      else { foot.style.display = 'none'; btn.classList.remove('active'); }
    }
  };

  // ==================== 載入邏輯 ====================
  async function loadUnitsIndex() {
    try {
      const response = await fetch('./docs/data/units-index.json');
      unitsIndex = await response.json();
      const select = document.getElementById('unit-select');
      select.innerHTML = '<option value="">請選擇課文</option>';
      unitsIndex.forEach(item => {
        const option = document.createElement('option');
        option.value = item.unitId;
        option.textContent = item.unitName || item.unitId;
        option.dataset.fileName = item.fileName;
        select.appendChild(option);
      });
      if (unitsIndex.length > 0) {
        select.value = unitsIndex[0].unitId;
        loadUnitById(unitsIndex[0].unitId);
      }
    } catch (e) {
      console.error('載入索引檔失敗', e);
      document.getElementById('unit-select').innerHTML = '<option value="">未載入索引</option>';
    }
  }

  async function loadUnitById(unitId) {
    const unit = unitsIndex.find(u => u.unitId === unitId);
    if (!unit) return;
    try {
      const response = await fetch(`./docs/data/${unit.fileName}`);
      const data = await response.json();
      Renderer.renderAll(data, unit.unitId);
    } catch (e) {
      console.error('載入課文失敗', e);
      alert('無法載入課文：' + unit.unitName);
    }
  }

  document.getElementById('unit-select').addEventListener('change', function(e) {
    const selectedOption = e.target.options[e.target.selectedIndex];
    const unitId = selectedOption.value;
    if (!unitId) return;
    if (selectedOption.dataset.data) {
      const data = JSON.parse(selectedOption.dataset.data);
      Renderer.renderAll(data, unitId);
    } else {
      loadUnitById(unitId);
    }
  });

  window.addEventListener('unhandledrejection', function(event) {
    if (event.reason?.message?.includes('play') || event.reason?.message?.includes('audio')) event.preventDefault();
  });
  if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
  window.onload = loadUnitsIndex;

  // ==================== 拖曳功能 ====================
  (function initDraggableTooltip() {
    const tooltip = document.getElementById('fixed-tooltip');
    const dragHandle = document.getElementById('tooltip-drag-handle');
    if (!tooltip || !dragHandle) return;
    let isDragging = false;
    let dragStartX = 0, dragStartY = 0;
    let tooltipLeft = 0, tooltipTop = 0;
    function startDrag(e) {
      if (!dragHandle.contains(e.target)) return;
      isDragging = true;
      tooltip.classList.add('dragging');
      dragStartX = e.clientX;
      dragStartY = e.clientY;
      const rect = tooltip.getBoundingClientRect();
      tooltipLeft = rect.left;
      tooltipTop = rect.top;
      tooltip.style.right = 'auto';
      tooltip.style.left = tooltipLeft + 'px';
      tooltip.style.top = tooltipTop + 'px';
      e.preventDefault();
    }
    function onDrag(e) {
      if (!isDragging) return;
      const dx = e.clientX - dragStartX;
      const dy = e.clientY - dragStartY;
      let newLeft = tooltipLeft + dx;
      let newTop = tooltipTop + dy;
      const maxLeft = window.innerWidth - tooltip.offsetWidth;
      const maxTop = window.innerHeight - tooltip.offsetHeight;
      newLeft = Math.max(0, Math.min(newLeft, maxLeft));
      newTop = Math.max(0, Math.min(newTop, maxTop));
      tooltip.style.left = newLeft + 'px';
      tooltip.style.top = newTop + 'px';
    }
    function stopDrag() {
      if (!isDragging) return;
      isDragging = false;
      tooltip.classList.remove('dragging');
    }
    dragHandle.addEventListener('mousedown', startDrag);
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    dragHandle.addEventListener('dragstart', (e) => e.preventDefault());
  })();
</script>
